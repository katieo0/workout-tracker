<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Lift</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --radius: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--text3);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── SCREENS ── */
    .screen { display: none; padding: 0 0 80px; min-height: 100dvh; }
    .screen.active { display: block; }

    /* ── HEADER ── */
    .header {
      padding: calc(var(--safe-top) + 20px) 20px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }
    .header-title span { color: var(--accent); }
    .header-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding-bottom: 8px;
    }

    /* ── DAY PICKER ── */
    .day-picker {
      display: flex;
      gap: 8px;
      padding: 0 20px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .day-picker::-webkit-scrollbar { display: none; }

    .day-chip {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .day-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
      font-weight: 600;
    }

    /* ── START WORKOUT BTN ── */
    .start-section { padding: 0 20px 24px; }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── SECTION LABEL ── */
    .section-label {
      padding: 0 20px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* ── EXERCISE CARDS (home) ── */
    .exercise-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .exercise-card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .exercise-card-last {
      font-size: 12px;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
    }
    .exercise-card-last span { color: var(--accent); }

    /* ── WORKOUT SESSION ── */
    #session-screen {
      background: var(--bg);
    }

    .session-header {
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .btn-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .session-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      flex: 1;
    }
    .session-date {
      font-size: 11px;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
    }

    /* Exercise picker in session */
    .add-exercise-section { padding: 16px 20px; }
    .exercise-search {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .exercise-search:focus { border-color: var(--accent); }
    .exercise-search::placeholder { color: var(--text3); }

    .exercise-picker-list {
      margin-top: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .exercise-picker-list.open { display: block; }
    .picker-item {
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .picker-item:last-child { border-bottom: none; }
    .picker-item:hover, .picker-item:active { background: var(--surface2); }
    .picker-item-last { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }

    /* Logged exercises in session */
    .session-exercises { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }

    .session-exercise {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .session-exercise-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .session-exercise-name { font-size: 15px; font-weight: 600; }
    .session-exercise-last { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }
    .session-exercise-last b { color: var(--accent); font-weight: 500; }

    .btn-remove {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--text3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    .set-log-area { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .set-num {
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      text-align: center;
    }
    .set-input {
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      width: 100%;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .set-input:focus { border-color: var(--accent); }
    .set-input::placeholder { color: var(--text3); font-size: 11px; }
    .set-label { font-size: 10px; color: var(--text3); text-align: center; margin-top: 2px; }

    .btn-del-set {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .add-set-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 4px;
    }
    .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

    .save-workout-section { padding: 16px 20px; }

    /* ── PROGRESS SCREEN ── */
    .progress-header {
      padding: calc(var(--safe-top) + 20px) 20px 16px;
    }

    .exercise-select-wrap { padding: 0 20px 20px; }
    .exercise-select {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    .chart-wrap {
      margin: 0 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      height: 220px;
    }

    .history-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-date {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text2);
    }
    .history-stats {
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
    }
    .history-notes {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text3);
    }
    .empty-state svg { margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(70px + var(--safe-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #0a0a0a;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .col-label {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 1fr auto;
      gap: 8px;
      padding: 0 16px 4px;
    }
    .col-label span {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      font-weight: 600;
    }
    .col-label span:first-child { text-align: left; }
  </style>
</head>
<body>

<!-- ── HOME SCREEN ── -->
<div id="home-screen" class="screen active">
  <div class="header">
    <div>
      <div class="header-title">LIFT<span>.</span></div>
    </div>
    <div class="header-sub" id="today-date"></div>
  </div>

  <div class="day-picker">
    <div class="day-chip active" data-day="legs">Legs</div>
    <div class="day-chip" data-day="back">Back / Bi / Shoulders</div>
    <div class="day-chip" data-day="chest">Chest / Tri</div>
  </div>

  <div class="start-section">
    <button class="btn-primary" id="start-workout-btn">START WORKOUT</button>
  </div>

  <div class="section-label">LAST SESSION PER EXERCISE</div>
  <div class="exercise-list" id="home-exercise-list">
    <div class="spinner"></div>
  </div>
</div>

<!-- ── SESSION SCREEN ── -->
<div id="session-screen" class="screen">
  <div class="session-header">
    <button class="btn-back" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div>
      <div class="session-title" id="session-title">LEGS</div>
      <div class="session-date" id="session-date-label"></div>
    </div>
  </div>

  <div class="add-exercise-section">
    <input class="exercise-search" id="exercise-search" placeholder="Search & add exercise..." autocomplete="off" />
    <div class="exercise-picker-list" id="exercise-picker-list"></div>
  </div>

  <div class="session-exercises" id="session-exercises"></div>

  <div class="save-workout-section">
    <button class="btn-primary" id="save-workout-btn">SAVE WORKOUT</button>
  </div>
</div>

<!-- ── PROGRESS SCREEN ── -->
<div id="progress-screen" class="screen">
  <div class="progress-header">
    <div class="header-title">PROGRESS<span style="color:var(--accent)">.</span></div>
  </div>

  <div class="exercise-select-wrap">
    <select class="exercise-select" id="progress-exercise-select">
      <option value="">Select an exercise...</option>
    </select>
  </div>

  <div class="chart-wrap" id="chart-wrap" style="display:none">
    <canvas id="progress-chart"></canvas>
  </div>

  <div class="history-list" id="progress-history"></div>
</div>

<!-- ── NAV ── -->
<nav class="nav">
  <button class="nav-btn active" data-screen="home-screen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Log
  </button>
  <button class="nav-btn" data-screen="progress-screen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://wkbdtejgqavwsbmxezbr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ZXQ-5Gy7xbk4JxoDGFHceA_Ia-RQ2k0';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── STATE ──
  let allExercises = [];
  let selectedDay = 'legs';
  let sessionExercises = []; // [{exercise, sets:[{weight,reps,notes}]}]
  let progressChart = null;
  let currentWorkoutId = null;

  // ── UTILS ──
  const $ = id => document.getElementById(id);
  const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const today = () => new Date().toISOString().split('T')[0];
  const dayLabel = { legs: 'LEGS', back: 'BACK / BI / SHOULDERS', chest: 'CHEST / TRI' };

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function setScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    $(id).classList.add('active');
    const navBtn = document.querySelector(`.nav-btn[data-screen="${id}"]`);
    if (navBtn) navBtn.classList.add('active');
    if (id === 'progress-screen') loadProgressExercises();
  }

  // ── INIT ──
  async function init() {
    $('today-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    $('session-date-label').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    const { data, error } = await db.from('exercises').select('*').order('sort_order');
    if (!error) allExercises = data;
    await loadHomeExercises();
  }

  // ── HOME ──
  async function loadHomeExercises() {
    const list = $('home-exercise-list');
    list.innerHTML = '<div class="spinner"></div>';

    // Step 1: get all workouts for selected day
    const { data: workouts, error: wErr } = await db
      .from('workouts')
      .select('id, date')
      .eq('day', selectedDay)
      .order('date', { ascending: false });

    if (wErr || !workouts || workouts.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No exercises logged for this day yet.<br>Start a workout to begin!</p></div>`;
      return;
    }

    const workoutIds = workouts.map(w => w.id);
    const workoutDateMap = Object.fromEntries(workouts.map(w => [w.id, w.date]));

    // Step 2: get all sets for those workouts
    const { data: sets, error: sErr } = await db
      .from('sets')
      .select('exercise_id, weight, reps, notes, workout_id')
      .in('workout_id', workoutIds)
      .order('workout_id', { ascending: false });

    if (sErr || !sets || sets.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No exercises logged for this day yet.<br>Start a workout to begin!</p></div>`;
      return;
    }

    // Build map: exercise_id -> most recent set
    const lastSet = {};
    for (const s of sets) {
      if (!lastSet[s.exercise_id]) {
        lastSet[s.exercise_id] = { ...s, date: workoutDateMap[s.workout_id] };
      }
    }

    const usedExerciseIds = [...new Set(sets.map(s => s.exercise_id))];
    const relevant = allExercises.filter(e => usedExerciseIds.includes(e.id));

    if (relevant.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No exercises logged for this day yet.<br>Start a workout to begin!</p></div>`;
      return;
    }

    list.innerHTML = relevant.map(ex => {
      const last = lastSet[ex.id];
      const lastText = last
        ? `<span>${last.weight ? last.weight + ' lbs' : '—'}</span> · ${last.reps} reps · ${fmt(last.date)}`
        : 'No data yet';
      return `
        <div class="exercise-card">
          <div>
            <div class="exercise-card-name">${ex.name}</div>
            <div class="exercise-card-last">${lastText}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── DAY PICKER ──
  document.querySelectorAll('.day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedDay = chip.dataset.day;
      loadHomeExercises();
    });
  });

  // ── START WORKOUT ──
  $('start-workout-btn').addEventListener('click', () => {
    sessionExercises = [];
    currentWorkoutId = null;
    $('session-title').textContent = dayLabel[selectedDay];
    renderSessionExercises();
    setScreen('session-screen');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  });

  $('back-btn').addEventListener('click', () => {
    if (sessionExercises.length > 0) {
      if (!confirm('Discard this workout?')) return;
    }
    setScreen('home-screen');
    document.querySelector('.nav-btn[data-screen="home-screen"]').classList.add('active');
  });

  // ── EXERCISE SEARCH ──
  const searchInput = $('exercise-search');
  const pickerList = $('exercise-picker-list');

  async function getLastSetForExercise(exerciseId) {
    const { data: sets } = await db
      .from('sets')
      .select('weight, reps, notes, workout_id')
      .eq('exercise_id', exerciseId)
      .order('workout_id', { ascending: false })
      .limit(1);

    if (!sets || sets.length === 0) return null;
    const s = sets[0];

    const { data: workouts } = await db
      .from('workouts')
      .select('date')
      .eq('id', s.workout_id)
      .single();

    return { ...s, workouts: workouts || {} };
  }

  searchInput.addEventListener('input', async () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { pickerList.classList.remove('open'); return; }

    const filtered = allExercises.filter(e =>
      e.name.toLowerCase().includes(q) && !sessionExercises.find(se => se.exercise.id === e.id)
    );

    if (filtered.length === 0) {
      pickerList.innerHTML = `<div class="picker-item" style="color:var(--text3)">No exercises found</div>`;
    } else {
      // Fetch last sets
      const items = await Promise.all(filtered.slice(0, 8).map(async ex => {
        const last = await getLastSetForExercise(ex.id);
        const lastStr = last ? `${last.weight ? last.weight + ' lbs · ' : ''}${last.reps} reps · ${fmt(last.workouts.date)}` : '';
        return `<div class="picker-item" data-id="${ex.id}">
          <span>${ex.name}</span>
          <span class="picker-item-last">${lastStr}</span>
        </div>`;
      }));
      pickerList.innerHTML = items.join('');
    }
    pickerList.classList.add('open');
  });

  pickerList.addEventListener('click', async e => {
    const item = e.target.closest('.picker-item[data-id]');
    if (!item) return;
    const ex = allExercises.find(e => e.id == item.dataset.id);
    if (!ex) return;

    const last = await getLastSetForExercise(ex.id);
    sessionExercises.push({
      exercise: ex,
      last,
      sets: [{ weight: '', reps: '', notes: '' }]
    });

    searchInput.value = '';
    pickerList.classList.remove('open');
    renderSessionExercises();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.add-exercise-section')) {
      pickerList.classList.remove('open');
    }
  });

  // ── SESSION RENDER ──
  function renderSessionExercises() {
    const container = $('session-exercises');
    if (sessionExercises.length === 0) {
      container.innerHTML = `<div class="empty-state"><p>Search above to add your first exercise</p></div>`;
      return;
    }

    container.innerHTML = sessionExercises.map((se, ei) => {
      const lastText = se.last
        ? `Last: <b>${se.last.weight ? se.last.weight + ' lbs · ' : ''}${se.last.reps} reps</b>${se.last.notes ? ' · ' + se.last.notes : ''}`
        : 'No previous data';

      const setsHtml = `
        <div class="col-label">
          <span>#</span><span>Weight</span><span>Reps</span><span>Notes</span><span></span>
        </div>
        ${se.sets.map((set, si) => `
          <div class="set-row">
            <div class="set-num">${si + 1}</div>
            <input class="set-input" type="number" inputmode="decimal" placeholder="lbs" value="${set.weight}"
              data-ei="${ei}" data-si="${si}" data-field="weight" />
            <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}"
              data-ei="${ei}" data-si="${si}" data-field="reps" />
            <input class="set-input" type="text" placeholder="note" value="${set.notes}"
              data-ei="${ei}" data-si="${si}" data-field="notes" style="font-family:'DM Sans',sans-serif;font-size:12px" />
            <button class="btn-del-set" data-ei="${ei}" data-si="${si}" data-action="del-set">×</button>
          </div>
        `).join('')}
        <button class="add-set-btn" data-ei="${ei}" data-action="add-set">+ Add set</button>
      `;

      return `
        <div class="session-exercise">
          <div class="session-exercise-header">
            <div>
              <div class="session-exercise-name">${se.exercise.name}</div>
              <div class="session-exercise-last">${lastText}</div>
            </div>
            <button class="btn-remove" data-ei="${ei}" data-action="remove-exercise">×</button>
          </div>
          <div class="set-log-area">${setsHtml}</div>
        </div>`;
    }).join('');
  }

  // Event delegation for session
  $('session-exercises').addEventListener('input', e => {
    const el = e.target;
    if (!el.dataset.field) return;
    const ei = +el.dataset.ei, si = +el.dataset.si;
    sessionExercises[ei].sets[si][el.dataset.field] = el.value;
  });

  $('session-exercises').addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const ei = +el.dataset.ei;

    if (action === 'remove-exercise') {
      sessionExercises.splice(ei, 1);
      renderSessionExercises();
    } else if (action === 'add-set') {
      sessionExercises[ei].sets.push({ weight: '', reps: '', notes: '' });
      renderSessionExercises();
      // Focus new weight input
      setTimeout(() => {
        const inputs = document.querySelectorAll(`[data-ei="${ei}"][data-field="weight"]`);
        inputs[inputs.length - 1]?.focus();
      }, 50);
    } else if (action === 'del-set') {
      const si = +el.dataset.si;
      if (sessionExercises[ei].sets.length === 1) return; // keep at least 1
      sessionExercises[ei].sets.splice(si, 1);
      renderSessionExercises();
    }
  });

  // ── SAVE WORKOUT ──
  $('save-workout-btn').addEventListener('click', async () => {
    const validExercises = sessionExercises.filter(se =>
      se.sets.some(s => s.reps !== '')
    );
    if (validExercises.length === 0) {
      showToast('Add at least one set to save');
      return;
    }

    $('save-workout-btn').disabled = true;
    $('save-workout-btn').textContent = 'SAVING...';

    try {
      // Create workout
      const { data: workout, error: wErr } = await db
        .from('workouts')
        .insert({ date: today(), day: selectedDay })
        .select()
        .single();

      if (wErr) throw wErr;

      // Insert all sets
      const setsToInsert = [];
      for (const se of validExercises) {
        for (const s of se.sets) {
          if (s.reps === '') continue;
          setsToInsert.push({
            workout_id: workout.id,
            exercise_id: se.exercise.id,
            weight: s.weight !== '' ? parseFloat(s.weight) : null,
            reps: parseInt(s.reps),
            notes: s.notes || null
          });
        }
      }

      const { error: sErr } = await db.from('sets').insert(setsToInsert);
      if (sErr) throw sErr;

      showToast('Workout saved! 💪');
      sessionExercises = [];
      await loadHomeExercises();
      setScreen('home-screen');
      document.querySelector('.nav-btn[data-screen="home-screen"]').classList.add('active');

    } catch (err) {
      console.error(err);
      showToast('Error saving — try again');
    } finally {
      $('save-workout-btn').disabled = false;
      $('save-workout-btn').textContent = 'SAVE WORKOUT';
    }
  });

  // ── PROGRESS ──
  async function loadProgressExercises() {
    const sel = $('progress-exercise-select');
    sel.innerHTML = '<option value="">Select an exercise...</option>' +
      allExercises.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  }

  $('progress-exercise-select').addEventListener('change', async e => {
    const exerciseId = e.target.value;
    if (!exerciseId) {
      $('chart-wrap').style.display = 'none';
      $('progress-history').innerHTML = '';
      return;
    }
    await loadProgressData(exerciseId);
  });

  async function loadProgressData(exerciseId) {
    $('progress-history').innerHTML = '<div class="spinner"></div>';

    // Step 1: get all sets for this exercise
    const { data: sets, error: sErr } = await db
      .from('sets')
      .select('weight, reps, notes, workout_id')
      .eq('exercise_id', exerciseId)
      .order('workout_id', { ascending: true });

    if (sErr || !sets || sets.length === 0) {
      $('chart-wrap').style.display = 'none';
      $('progress-history').innerHTML = `<div class="empty-state"><p>No data logged for this exercise yet.</p></div>`;
      return;
    }

    // Step 2: get workout dates for those workout_ids
    const workoutIds = [...new Set(sets.map(s => s.workout_id))];
    const { data: workouts } = await db
      .from('workouts')
      .select('id, date')
      .in('id', workoutIds);

    const workoutDateMap = Object.fromEntries((workouts || []).map(w => [w.id, w.date]));

    // Attach dates to sets
    const setsWithDates = sets.map(s => ({ ...s, date: workoutDateMap[s.workout_id] }))
      .filter(s => s.date);

    // Group by date
    const byDate = {};
    for (const s of setsWithDates) {
      const d = s.date;
      if (!byDate[d]) byDate[d] = { maxWeight: 0, sets: [] };
      if ((s.weight || 0) > byDate[d].maxWeight) byDate[d].maxWeight = s.weight;
      byDate[d].sets.push(s);
    }

    const dates = Object.keys(byDate).sort();
    const weights = dates.map(d => byDate[d].maxWeight || null);

    $('chart-wrap').style.display = 'block';

    if (progressChart) progressChart.destroy();
    progressChart = new Chart($('progress-chart'), {
      type: 'line',
      data: {
        labels: dates.map(fmt),
        datasets: [{
          data: weights,
          borderColor: '#c8f135',
          backgroundColor: 'rgba(200,241,53,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#c8f135',
          pointRadius: 4,
          tension: 0.3,
          fill: true,
          spanGaps: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } }, grid: { color: '#1e1e1e' } },
          y: { ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } }, grid: { color: '#1e1e1e' } }
        }
      }
    });

    // History list — all sets grouped by date descending
    const historyHtml = [...dates].reverse().map(d => {
      const daySets = byDate[d].sets;
      return daySets.map((s, i) => `
        <div class="history-item">
          <div>
            <div class="history-date">${fmt(d)} · Set ${i + 1}</div>
            ${s.notes ? `<div class="history-notes">${s.notes}</div>` : ''}
          </div>
          <div class="history-stats">${s.weight ? s.weight + ' lbs · ' : ''}${s.reps} reps</div>
        </div>`).join('');
    }).join('');

    $('progress-history').innerHTML = historyHtml;
  }

  // ── NAV ──
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => setScreen(btn.dataset.screen));
  });

  init();
</script>
</body>
</html>
